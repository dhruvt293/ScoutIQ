version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: scoutiq_db
    restart: always
    environment:
      POSTGRES_USER: scoutiq_user
      POSTGRES_PASSWORD: scoutiq_password
      POSTGRES_DB: scoutiq
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: scoutiq_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdata:
